<nav class="navbar-container">
    <div class="header-logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span class="logo-text">GitTogether</span>
    </div>

    <div class="header-user" *ngIf="usuarioLogueado">
        <button class="btn-header-logout" (click)="onLogout()" title="Cerrar Sesión">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            <span>Salir</span>
        </button>

        <div class="header-divider"></div>

        <span class="user-name">{{ usuarioLogueado.nombre }}</span>
        <div class="avatar-container">
            <img [src]="usuarioLogueado.avatar || 'assets/default-avatar.png'" alt="Avatar" class="user-avatar"
                onerror="this.src='https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff'">
            <div class="online-indicator"></div>
        </div>
    </div>
</nav>
